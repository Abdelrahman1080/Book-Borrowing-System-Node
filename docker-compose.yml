version: '3.9'

services:
  frontend:
    build:
      context: ./frontend    
      dockerfile: Dockerfile
    image: frontend:1.0.0
    container_name: frontend_container
    ports:
      - "8088:8088"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend    
      dockerfile: Dockerfile
    image: backend:1.0.0
    container_name: backend_container
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped