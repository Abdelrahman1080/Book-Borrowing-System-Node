<div class="my-books-container">
  <div class="container-header">
    <h2 class="page-title">
      <span class="title-icon">📖</span>
      My Books
    </h2>
    <p class="page-subtitle">Manage your personal book collection</p>
  </div>

  <!-- Create Book Section -->
  <div class="create-book-section">
    <div class="create-book-card">
      <div class="card-icon">✨</div>
      <h3 class="card-title">Add a New Book</h3>
      <div class="input-group">
        <input 
          [(ngModel)]="newTitle" 
          placeholder="Enter book title..." 
          type="text"
          class="book-input"
          (keyup.enter)="createBook()">
        <div class="input-focus-effect"></div>
      </div>
      <button (click)="createBook()" class="create-button" [class.disabled]="!newTitle.trim()">
        <span class="button-icon">➕</span>
        <span class="button-text">Create Book</span>
      </button>
    </div>
  </div>

  <!-- Books Collection -->
  <div class="books-collection">
    <div class="collection-header">
      <h3 class="collection-title">
        <span class="collection-icon">📚</span>
        Your Collection
        <span class="book-count" *ngIf="books.length > 0">({{books.length}} books)</span>
      </h3>
    </div>

    <!-- Empty State -->
    <div *ngIf="books.length === 0" class="empty-state">
      <div class="empty-animation">
        <div class="empty-book-icon">📕</div>
        <div class="empty-book-icon second">📘</div>
        <div class="empty-book-icon third">📙</div>
      </div>
      <h3 class="empty-title">No Books Yet</h3>
      <p class="empty-message">Start by creating your first book above!</p>
    </div>

    <!-- Books Grid -->
    <div class="books-grid" *ngIf="books.length > 0">
      <div *ngFor="let book of books" class="book-card" 
           [class.archived]="book.isArchived" 
           [class.borrowed]="book.borrowedBy">
        
        <!-- Book Status Badge -->
        <div class="book-status-badge" [ngClass]="getStatus(book)">
          <span class="status-icon">{{getStatusIcon(book)}}</span>
          <span class="status-text">{{getStatusText(book)}}</span>
        </div>
        
        <!-- Book Content -->
        <div class="book-content">
          <div class="book-icon-large">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 4H20V20H4V4Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <path d="M8 8H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M8 12H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M8 16H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M16 4V20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          
          <h3 class="book-title">{{book.title}}</h3>
          
          <div class="book-meta">
         
            <div class="meta-item" *ngIf="book.borrowedBy">
              <span class="meta-icon">👤</span>
              <span class="meta-text">Borrowed  </span>
            </div>
    
          </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="book-actions">
          <button 
            (click)="archiveBook(book)" 
            *ngIf="!book.isArchived && !book.borrowedBy"
            class="action-button archive-button">
            <span class="button-icon">📦</span>
            <span class="button-text">Archive</span>
          </button>
          
          <button 
            (click)="unarchiveBook(book)" 
            *ngIf="book.isArchived && !book.borrowedBy"
            class="action-button unarchive-button">
            <span class="button-icon">📤</span>
            <span class="button-text">Unarchive</span>
          </button>
          
          <div *ngIf="book.borrowedBy" class="borrowed-message">
            <span class="message-icon">🔒</span>
            <span class="message-text">Currently borrowed</span>
          </div>
          
          <div *ngIf="book.isArchived && !book.borrowedBy" class="archived-message">
            <span class="message-icon">🗄️</span>
            <span class="message-text">In archive</span>
          </div>
        </div>
        
      </div>
    </div>
  </div>
</div>
